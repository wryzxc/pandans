name:  Deploy - GitHub Pages

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name:  Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_hash: ${{ steps.build_hash.outputs.build_hash }}

    steps:
      - name:  Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name:  Install dependencies
        run: npm ci --prefer-offline

      - name:  Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name:  Get build hash
        id: build_hash
        run: echo "build_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name:  Build project
        run: npm run build

      - name:  Create 404 fallback for SPA
        run: |
          cp dist/index.html dist/404.html
          echo "Created 404.html for SPA routing"

      - name:  Add deployment metadata
        run: |
          cat > dist/_build.json << 'EOF'
          {
            "version": "${{ steps.version.outputs.version }}",
            "build_hash": "${{ steps.build_hash.outputs.build_hash }}",
            "build_date": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "repository": "${{ github.repository }}"
          }
          EOF
          echo "Build metadata:"
          cat dist/_build.json

      - name:  Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 3

  deploy:
    name:  Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name:  Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name:  Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name:  Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name:  Generate deployment report
        if: always()
        run: |
          echo "## Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.build.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Hash**: ${{ needs.build.outputs.build_hash }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "- **URL**: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Message**: ✅ Deployment successful!" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Message**:  Deployment failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name:  Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed!"
          echo "Previous version remains active."
          echo "Check the deployment logs for details."

  verify:
    name:  Post-Deployment Verification
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: ⏳ Wait for deployment propagation
        run: sleep 30

      - name:  Check deployment status
        run: |
          echo "Checking deployment..."
          DEPLOY_URL="https://wryzxc.github.io/pandans"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL" || echo "000")
          echo "HTTP Status: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Deployment verified successfully"
          else
            echo "⚠️  HTTP Status: $HTTP_STATUS - May need a few more minutes to propagate"
          fi
