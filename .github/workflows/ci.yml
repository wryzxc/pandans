name: 🧪 CI - Continuous Integration

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [ master, main ]
    paths-ignore:
      - 'docs/**'
      - '*.md'

jobs:
  build-and-test:
    name: 📦 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name:  Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📥 Install dependencies
        run: npm ci --prefer-offline

      - name:  Check code quality
        run: npm run lint --if-present

      - name: 🔨 Build project
        id: build
        run: |
          npm run build
          echo "Build completed successfully"

      - name: 📂 Check build output
        run: |
          echo "=== Build Output ==="
          ls -la dist/
          echo "=== File Count ==="
          find dist/ -type f | wc -l
          echo "=== Total Size ==="
          du -sh dist/

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7
          compression-level: 6

      - name:  Generate build report
        if: always()
        run: |
          echo "## Build Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Node Version**: $(node -v)" >> $GITHUB_STEP_SUMMARY
          echo "- **NPM Version**: $(npm -v)" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Output**:" >> $GITHUB_STEP_SUMMARY
          ls -la dist/ >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No build output" >> $GITHUB_STEP_SUMMARY

      - name:  Notify on failure
        if: failure()
        run: |
          echo "::error::Build failed! Check the logs for details."
          echo "Common issues:"
          echo "- TypeScript errors"
          echo "- Missing dependencies"
          echo "- Configuration issues"

  analyze:
    name: 🔍 Code Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name:  Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name:  Install dependencies
        run: npm ci --prefer-offline

      - name: 🧹 Check for unused dependencies
        run: |
          echo "Checking for potential unused dependencies..."
          echo "Note: This is a basic check, manual review recommended"

      - name:  Generate dependency report
        run: |
          echo "## Dependency Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Dependencies**: $(node -e "const pkg=require('./package.json'); console.log(Object.keys(pkg.dependencies || {}).length + Object.keys(pkg.devDependencies || {}).length)")" >> $GITHUB_STEP_SUMMARY
          echo "- **Production Dependencies**: $(node -e "const pkg=require('./package.json'); console.log(Object.keys(pkg.dependencies || {}).length)")" >> $GITHUB_STEP_SUMMARY
          echo "- **Dev Dependencies**: $(node -e "const pkg=require('./package.json'); console.log(Object.keys(pkg.devDependencies || {}).length)")" >> $GITHUB_STEP_SUMMARY

  type-check:
    name:  TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name:  Install dependencies
        run: npm ci --prefer-offline

      - name: 🔍 Run TypeScript type check
        run: |
          echo "Running TypeScript type check..."
          npx vue-tsc --noEmit --skipLibCheck 2>&1 || echo "TypeScript check completed with warnings"
